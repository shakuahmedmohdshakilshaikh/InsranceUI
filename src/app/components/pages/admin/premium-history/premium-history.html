<h2>Premium History</h2>

<p *ngIf="loading">Loading...</p>
<p *ngIf="errorMessage">{{ errorMessage }}</p>

<div *ngIf="!loading && premiums.length > 0" class="table-container">
  <table mat-table [dataSource]="premiums" class="mat-elevation-z8">
    
    <!-- Premium Schedule ID Column -->
    <ng-container matColumnDef="premiumScheduleId">
      <th mat-header-cell *matHeaderCellDef>Premium Schedule ID</th>
      <td mat-cell *matCellDef="let element">{{ element.premiumScheduleId }}</td>
    </ng-container>

    <!-- Policy ID Column -->
    <ng-container matColumnDef="policyId">
      <th mat-header-cell *matHeaderCellDef>Policy ID</th>
      <td mat-cell *matCellDef="let element">{{ element.policyId }}</td>
    </ng-container>

    <!-- Premium Amount Column -->
    <ng-container matColumnDef="premiumAmount">
      <th mat-header-cell *matHeaderCellDef>Premium Amount</th>
      <td mat-cell *matCellDef="let element">{{ element.amount }}</td>
    </ng-container>

    <!-- Due Date Column -->
    <ng-container matColumnDef="dueDate">
      <th mat-header-cell *matHeaderCellDef>Due Date</th>
      <td mat-cell *matCellDef="let element">{{ element.dueDate | date: 'MM/dd/yyyy' }}</td>
    </ng-container>

    <!-- Status Column -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let element">{{ element.paymentStatus }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>

<p *ngIf="!loading && premiums.length === 0 && !errorMessage">No premium history found</p>
